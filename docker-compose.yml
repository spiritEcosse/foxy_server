x-db-main: &db-main foxy
x-db-dev: &db-dev foxy_dev

x-app-env: &app-env
  FOXY_CLIENT: ${FOXY_CLIENT}
  FOXY_ADMIN: ${FOXY_ADMIN}
  APP_CLOUD_NAME: ${APP_CLOUD_NAME}
  APP_BUCKET_HOST: ${APP_BUCKET_HOST}
  PINTEREST_API_HOST: ${PINTEREST_API_HOST}
  PINTEREST_BOARD_ID: ${PINTEREST_BOARD_ID}
  PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID}
  PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET}
  YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN}
  YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
  YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
  TWITTER_API_KEY: ${TWITTER_API_KEY}
  TWITTER_API_SECRET: ${TWITTER_API_SECRET}
  TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN}
  TWITTER_ACCESS_TOKEN_SECRET: ${TWITTER_ACCESS_TOKEN_SECRET}
  TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN}

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_HOST_AUTH_METHOD: trust

x-postgres-base: &postgres-base
  image: postgres:17-alpine
  restart: always
  networks:
    - backend
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5

services:

  postgres-main:
    <<: *postgres-base
    profiles: ["main"]
    container_name: postgres-main
    environment:
      <<: *postgres-env
      DB_NAME: *db-main
    volumes:
      - pgdata-main:/var/lib/postgresql/data
      - pg_socket_main:/var/run/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  postgres-dev:
    <<: *postgres-base
    profiles: ["dev"]
    container_name: postgres-dev
    environment:
      <<: *postgres-env
      DB_NAME: *db-dev
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - pg_socket_dev:/var/run/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  migrate-main:
    image: ghcr.io/spiritecosse/foxy_server_build:main
    restart: "no"
    profiles: ["main"]
    depends_on:
      postgres-main:
        condition: service_healthy
    command: ["atlas", "migrate", "apply", "--env", "prod", "--config", "file:///app/atlas.hcl"]
    volumes:
      - ./migrations:/app/migrations
      - ./atlas.hcl:/app/atlas.hcl
      - pg_socket_main:/var/run/postgresql
    working_dir: /app
    networks:
      - backend

  migrate-dev:
    image: ghcr.io/spiritecosse/foxy_server_build:dev
    restart: "no"
    profiles: ["dev"]
    depends_on:
      postgres-dev:
        condition: service_healthy
    command: ["atlas", "migrate", "apply", "--env", "dev", "--config", "file:///app/atlas.hcl"]
    volumes:
      - ./migrations:/app/migrations
      - ./atlas.hcl:/app/atlas.hcl
      - pg_socket_dev:/var/run/postgresql
    working_dir: /app
    networks:
      - backend

  foxy-main:
    image: ghcr.io/spiritecosse/foxy_server:main
    container_name: foxy-main
    restart: always
    profiles: ["main"]
    depends_on:
      migrate-main:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PG_DB: *db-main
      PG_USER: *db-main
    volumes:
      - pg_socket_main:/var/run/postgresql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foxy-main.rule=Host(`api.faithfishart.com`)"
      - "traefik.http.routers.foxy-main.entrypoints=websecure"
      - "traefik.http.routers.foxy-main.tls.certresolver=letsencrypt"
    networks:
      - web
      - backend

  foxy-dev:
    image: ghcr.io/spiritecosse/foxy_server:dev
    container_name: foxy-dev
    restart: always
    profiles: ["dev"]
    depends_on:
      migrate-dev:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PG_DB: *db-dev
      PG_USER: *db-dev
    volumes:
      - pg_socket_dev:/var/run/postgresql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foxy-dev.rule=Host(`dev-api.faithfishart.com`)"
      - "traefik.http.routers.foxy-dev.entrypoints=websecure-dev"
      - "traefik.http.routers.foxy-dev.tls.certresolver=letsencrypt"
    networks:
      - web
      - backend

volumes:
  pgdata-main:
  pgdata-dev:
  pg_socket_main:
  pg_socket_dev:

networks:
  web:
    external: true
  backend:
    driver: bridge
