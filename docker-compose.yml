x-app-env: &app-env
  FOXY_CLIENT: ${FOXY_CLIENT}
  FOXY_ADMIN: ${FOXY_ADMIN}
  APP_CLOUD_NAME: ${APP_CLOUD_NAME}
  APP_BUCKET_HOST: ${APP_BUCKET_HOST}
  ENVIRONMENT: ${ENVIRONMENT}
  PINTEREST_API_HOST: ${PINTEREST_API_HOST}
  PINTEREST_BOARD_ID: ${PINTEREST_BOARD_ID}
  PINTEREST_REFRESH_TOKEN: ${PINTEREST_REFRESH_TOKEN}
  PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID}
  PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET}
  YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN}
  YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
  YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
  TWITTER_API_KEY: ${TWITTER_API_KEY}
  TWITTER_API_SECRET: ${TWITTER_API_SECRET}
  TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN}
  TWITTER_ACCESS_TOKEN_SECRET: ${TWITTER_ACCESS_TOKEN_SECRET}
  TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN}

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pg_socket:/var/run/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./helper.sql:/docker-entrypoint-initdb.d/helper.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  foxy-prod:
    image: ghcr.io/spiritecosse/foxy_server:main
    container_name: foxy-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      PG_DB: foxy
      PG_USER: foxy
    volumes:
      - pg_socket:/var/run/postgresql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foxy-prod.rule=Host(`api.faithfishart.com`)"
      - "traefik.http.routers.foxy-prod.entrypoints=websecure"
      - "traefik.http.routers.foxy-prod.tls.certresolver=letsencrypt"
    networks:
      - web
      - backend

  foxy-dev:
    image: ghcr.io/spiritecosse/foxy_server:dev
    container_name: foxy-dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      PG_DB: dev_foxy
      PG_USER: dev_foxy
    volumes:
      - pg_socket:/var/run/postgresql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foxy-dev.rule=Host(`dev-api.faithfishart.com`)"
      - "traefik.http.routers.foxy-dev.entrypoints=websecure"
      - "traefik.http.routers.foxy-dev.tls.certresolver=letsencrypt"
    networks:
      - web
      - backend

volumes:
  pgdata:
  pg_socket:

networks:
  web:
    external: true
  backend:
    driver: bridge
